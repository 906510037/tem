# Unified experiment configuration — single source of truth.

system:
  seed: 2026
  deterministic: true
  device: auto

dataset:
  name: cifar10
  root: ./data
  num_classes: 10

# -----------------------------------------------------------
# Model registry: 3 ResNet variants for comparison
# -----------------------------------------------------------
models:
  active: [resnet18_cifar, resnet34_cifar, resnet50_cifar]

  resnet18_cifar:
    arch: resnet18_cifar
    base_channels: 64

  resnet34_cifar:
    arch: resnet34_cifar
    base_channels: 64

  resnet50_cifar:
    arch: resnet50_cifar
    base_channels: 64

# -----------------------------------------------------------
# Training
# -----------------------------------------------------------
train:
  epochs: 30
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  batch_size: 128
  num_workers: 2
  label_smoothing: 0.1
  warmup_epochs: 5
  warmup_start_lr: 0.01
  grad_clip_norm: 1.0
  cutout: true
  cutout_length: 16
  checkpoint_topk: 3

# -----------------------------------------------------------
# Evaluation
# -----------------------------------------------------------
eval:
  batch_size: 256
  num_workers: 2

# -----------------------------------------------------------
# Temperature: 0–110 °C, step 2 °C (56 evaluation points)
# -----------------------------------------------------------
temperature:
  range: [0, 110]
  step: 2
  block_mse_temperature: 100

# -----------------------------------------------------------
# Non-ideality parameters (3rd tuning round)
# -----------------------------------------------------------
# Original: nominal_gain=0.955 to increase low-T degradation
# ka/kb/lam moderate to prevent collapse at 110°C
# Improved: rho=0.80, comp_strength=0.40 for partial recovery
nonideal:
  original:
    mode: original
    ka: 0.00050
    kb: 0.00015
    sigma0: 0.045
    lam: 0.008
    nominal_gain: 0.955
    nominal_bias: 0.0

  improved:
    mode: improved
    ka: 0.00050
    kb: 0.00015
    sigma0: 0.045
    lam: 0.008
    rho: 0.80
    nominal_gain: 0.955
    nominal_bias: 0.0
    compensation_strength: 0.40

# -----------------------------------------------------------
# Outputs
# -----------------------------------------------------------
outputs:
  root: ./outputs
